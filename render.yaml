services:
  - type: web
    name: faketect-api
    env: docker
    plan: starter
    autoDeploy: true
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DEV_AUTH_BYPASS
        value: "false"

      # CORS
      - key: ALLOWED_ORIGINS
        value: https://faketect.com,https://www.faketect.com,https://app.faketect.com,https://www.faketect.app,https://faketect.app,https://faketect.vercel.app,https://faketect-git-main-yacine-tirichines-projects.vercel.app

      # Supabase
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false

      # Providers
      - key: SIGHTENGINE_USER
        sync: false
      - key: SIGHTENGINE_SECRET
        sync: false
      - key: ILLUMINARTY_API_KEY
        sync: false

      # Detection/quota
      - key: AI_DECISION_THRESHOLD
        value: "0.7"
      - key: GUEST_DAILY_LIMIT
        value: "3"
      - key: VIDEO_DAILY_LIMIT
        value: "15"
      - key: VIDEO_MAX_SECONDS
        value: "60"
      - key: VIDEO_MAX_BYTES
        value: "209715200"

      # Certification
      - key: CERT_SIGNING_SECRET
        sync: false
